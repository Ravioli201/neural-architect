<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1100" height="560" fill="url(#bg)" rx="12"/>

  <!-- title -->
  <text x="40" y="46" fill="#f1f5f9" font-size="22" font-weight="700">Neural Architect — system architecture</text>
  <text x="40" y="70" fill="#94a3b8" font-size="13">Raw telemetry → deterministic preprocessing → Gemini reconstruction → analyst-ready artifacts</text>

  <!-- Layer 1: Sources -->
  <text x="40" y="120" fill="#cbd5e1" font-size="13" font-weight="600" letter-spacing="2">SOURCES</text>
  <g transform="translate(40,140)">
    <rect width="180" height="68" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="28" fill="#e2e8f0" font-size="14" font-weight="600">SIEM / EDR feeds</text>
    <text x="20" y="50" fill="#94a3b8" font-size="11">Sysmon · Splunk · Defender</text>
  </g>
  <g transform="translate(40,222)">
    <rect width="180" height="68" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="28" fill="#e2e8f0" font-size="14" font-weight="600">Server logs</text>
    <text x="20" y="50" fill="#94a3b8" font-size="11">syslog · Apache · Nginx</text>
  </g>
  <g transform="translate(40,304)">
    <rect width="180" height="68" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="28" fill="#e2e8f0" font-size="14" font-weight="600">Cloud audit</text>
    <text x="20" y="50" fill="#94a3b8" font-size="11">CloudTrail · Azure AD · GWS</text>
  </g>
  <g transform="translate(40,386)">
    <rect width="180" height="68" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="28" fill="#e2e8f0" font-size="14" font-weight="600">Forensic artifacts</text>
    <text x="20" y="50" fill="#94a3b8" font-size="11">EVTX · MFT · memory triage</text>
  </g>

  <!-- Layer 2: Preprocess -->
  <text x="270" y="120" fill="#cbd5e1" font-size="13" font-weight="600" letter-spacing="2">PREPROCESS (deterministic)</text>
  <g transform="translate(270,140)">
    <rect width="240" height="100" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="30" fill="#e2e8f0" font-size="14" font-weight="600">Format detector</text>
    <text x="20" y="52" fill="#94a3b8" font-size="11">Auto-detects JSONL, syslog,</text>
    <text x="20" y="68" fill="#94a3b8" font-size="11">Apache, CSV, plain text</text>
    <text x="20" y="86" fill="#94a3b8" font-size="11">→ normalized event stream</text>
  </g>
  <g transform="translate(270,260)">
    <rect width="240" height="100" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="30" fill="#e2e8f0" font-size="14" font-weight="600">IOC extractor</text>
    <text x="20" y="52" fill="#94a3b8" font-size="11">Regex pass for IPs, domains,</text>
    <text x="20" y="68" fill="#94a3b8" font-size="11">hashes, CVEs, paths, registry</text>
    <text x="20" y="86" fill="#94a3b8" font-size="11">→ structured anchors for LLM</text>
  </g>
  <g transform="translate(270,380)">
    <rect width="240" height="80" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="30" fill="#e2e8f0" font-size="14" font-weight="600">Prompt builder</text>
    <text x="20" y="52" fill="#94a3b8" font-size="11">Bounded context: timeline +</text>
    <text x="20" y="68" fill="#94a3b8" font-size="11">IOCs + raw excerpt</text>
  </g>

  <!-- Layer 3: LLM -->
  <text x="560" y="120" fill="#cbd5e1" font-size="13" font-weight="600" letter-spacing="2">RECONSTRUCTION</text>
  <g transform="translate(560,140)">
    <rect width="240" height="320" rx="14" fill="url(#llmGrad)"/>
    <text x="20" y="34" fill="#fff" font-size="16" font-weight="700">Gemini 2.5 Flash</text>
    <text x="20" y="58" fill="#e0e7ff" font-size="11">structured output (Pydantic)</text>

    <line x1="20" y1="78" x2="220" y2="78" stroke="#a5b4fc" stroke-opacity="0.5"/>

    <text x="20" y="104" fill="#fff" font-size="12" font-weight="600">Analyst system prompt</text>
    <text x="20" y="124" fill="#e0e7ff" font-size="11">• Ground claims in evidence</text>
    <text x="20" y="142" fill="#e0e7ff" font-size="11">• Map to MITRE ATT&amp;CK</text>
    <text x="20" y="160" fill="#e0e7ff" font-size="11">• Conservative attribution</text>
    <text x="20" y="178" fill="#e0e7ff" font-size="11">• Specific recommendations</text>

    <text x="20" y="208" fill="#fff" font-size="12" font-weight="600">Returns AttackChain</text>
    <text x="20" y="228" fill="#e0e7ff" font-size="11">• summary · severity</text>
    <text x="20" y="246" fill="#e0e7ff" font-size="11">• timeline of events</text>
    <text x="20" y="264" fill="#e0e7ff" font-size="11">• techniques per event</text>
    <text x="20" y="282" fill="#e0e7ff" font-size="11">• indicators of compromise</text>
    <text x="20" y="300" fill="#e0e7ff" font-size="11">• recommended actions</text>
  </g>

  <!-- Layer 4: Outputs -->
  <text x="850" y="120" fill="#cbd5e1" font-size="13" font-weight="600" letter-spacing="2">OUTPUTS</text>
  <g transform="translate(850,140)">
    <rect width="200" height="68" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="28" fill="#e2e8f0" font-size="14" font-weight="600">Streamlit UI</text>
    <text x="20" y="50" fill="#94a3b8" font-size="11">timeline · heatmap · IOCs</text>
  </g>
  <g transform="translate(850,222)">
    <rect width="200" height="68" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="28" fill="#e2e8f0" font-size="14" font-weight="600">FastAPI service</text>
    <text x="20" y="50" fill="#94a3b8" font-size="11">/analyze · /export/*</text>
  </g>
  <g transform="translate(850,304)">
    <rect width="200" height="68" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="28" fill="#e2e8f0" font-size="14" font-weight="600">STIX 2.1 bundle</text>
    <text x="20" y="50" fill="#94a3b8" font-size="11">→ MISP · OpenCTI · TAXII</text>
  </g>
  <g transform="translate(850,386)">
    <rect width="200" height="68" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="28" fill="#e2e8f0" font-size="14" font-weight="600">Markdown IR report</text>
    <text x="20" y="50" fill="#94a3b8" font-size="11">→ Jira · email · ticketing</text>
  </g>

  <!-- arrows: sources -> preprocess -->
  <line x1="220" y1="174" x2="270" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="220" y1="256" x2="270" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="220" y1="338" x2="270" y2="310" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="220" y1="420" x2="270" y2="410" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrows: preprocess -> llm -->
  <line x1="510" y1="190" x2="560" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="310" x2="560" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="420" x2="560" y2="380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrows: llm -> outputs -->
  <line x1="800" y1="200" x2="850" y2="174" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="260" x2="850" y2="256" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="320" x2="850" y2="338" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="380" x2="850" y2="420" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- footer caption -->
  <text x="40" y="525" fill="#64748b" font-size="11">Deterministic preprocessing keeps the LLM grounded; structured output keeps responses machine-consumable.</text>
</svg>
